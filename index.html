<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Lokal-Pedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .bg-gradient-custom {
            background: linear-gradient(180deg, #F97316 0%, #FB923C 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gradient-custom h-screen flex flex-col justify-between overflow-hidden">

    <div class="flex-1 flex flex-col items-center justify-center p-8 text-white">
        <div class="w-24 h-24 bg-white rounded-3xl shadow-2xl flex items-center justify-center mb-6 rotate-3">
            <i class="fas fa-store text-orange-500 text-5xl"></i>
        </div>
        
        <h1 class="text-4xl font-extrabold tracking-tight mb-2">Lokal-Pedia</h1>
        <p class="text-orange-100 text-center text-sm leading-relaxed opacity-90">
            Membawa warung tetangga, <br> ke genggaman dunia.
        </p>
    </div>

    <div class="glass-card rounded-t-[40px] p-8 shadow-2xl">
        <div class="max-w-md mx-auto">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Selamat Datang!</h2>
            <p class="text-gray-500 text-sm mb-8">Temukan produk terbaik dari UMKM di sekitarmu atau mulai promosikan usahamu sendiri.</p>

            <div class="space-y-4">
               <a href="https://alipageng-ship-it.github.io/Lokal-Pedia/" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform active:scale-95 flex items-center justify-center gap-3">
    Mulai Jelajah <i class="fas fa-arrow-right text-sm"></i>
</a>

                <button class="w-full bg-white border-2 border-gray-100 text-gray-700 font-bold py-4 rounded-2xl hover:bg-gray-50 transition-all flex items-center justify-center gap-3">
                    <img src="https://www.svgrepo.com/show/475656/google.svg" class="w-5 h-5">
                    Masuk dengan Google
                </button>
            </div>

            <p class="text-center text-xs text-gray-400 mt-8">
                Dengan masuk, kamu menyetujui <br> 
                <span class="text-orange-500 font-semibold underline">Syarat & Ketentuan</span> kami.
            </p>
        </div>
    </div>

</body>
</html>
